<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - SKR INTERNATIONAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="#">SKR INTERNATIONAL</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link active" href="dashboard.html">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="deposit.html">Deposit</a>
</li>

<li class="nav-item">
<a class="nav-link" href="withdraw.html">Withdraw</a>
</li>

<li class="nav-item">
<a class="nav-link" href="login.html" id="logoutBtn">Logout</a>
</li>

</ul>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="row">

<div class="col-md-8 mx-auto">

<div class="card shadow-lg p-4">

<h2 class="text-center text-primary">
Welcome,
<span id="userName">Loading...</span>
</h2>

<hr>

<h4 class="text-center">
Current Balance
</h4>

<h1 class="balance">
Rs.
<span id="balance">0</span>
</h1>

<div class="row mt-4">

<div class="col-md-6 mb-3">

<a href="deposit.html" class="btn btn-success w-100">
Deposit
</a>

</div>

<div class="col-md-6 mb-3">

<a href="withdraw.html" class="btn btn-danger w-100">
Withdraw
</a>

</div>

</div>

<hr>

<h5 class="text-center">
Recent Activity
</h5>

<ul class="list-group">

<li class="list-group-item">
No Transactions Found
</li>

</ul>

</div>

</div>

</div>

</div>

<footer class="bg-dark text-white text-center p-3 mt-5">

© 2026 SKR INTERNATIONAL - All Rights Reserved

</footer>

<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";

return;

}

const userRef = doc(db,"users",user.uid);

const userSnap = await getDoc(userRef);

if(userSnap.exists()){

const data=userSnap.data();

document.getElementById("userName").innerText=data.name;

document.getElementById("balance").innerText=data.balance;

}

});

document.getElementById("logoutBtn").addEventListener("click",async(e)=>{

e.preventDefault();

await signOut(auth);

window.location.href="login.html";

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
