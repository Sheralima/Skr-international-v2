<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - SKR INTERNATIONAL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="#">

SKR INTERNATIONAL ADMIN

</a>

<button id="logoutBtn" class="btn btn-danger">

Logout

</button>

</div>

</nav>

<div class="container mt-4">

<h2 class="text-center text-primary mb-4">

Admin Dashboard

</h2>

<div class="row">

<div class="col-md-3 mb-3">

<div class="card shadow text-center p-3">

<h5>Total Users</h5>

<h2 id="totalUsers">0</h2>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow text-center p-3">

<h5>Total Balance</h5>

<h2 id="totalBalance">0</h2>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow text-center p-3">

<h5>Pending Deposits</h5>

<h2 id="pendingDeposits">0</h2>

</div>

</div>

<div class="col-md-3 mb-3">

<div class="card shadow text-center p-3">

<h5>Pending Withdraws</h5>

<h2 id="pendingWithdraws">0</h2>

</div>

</div>

</div>
<div class="card shadow p-4 mb-4">

<h4 class="mb-3 text-primary">

Pending Deposit Requests

</h4>

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Email</th>

<th>Amount</th>

<th>Method</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="depositTable">

<tr>

<td colspan="5" class="text-center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<div class="card shadow p-4 mb-4">

<h4 class="mb-3 text-danger">

Pending Withdraw Requests

</h4>

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>User ID</th>

<th>Amount</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="withdrawTable">

<tr>

<td colspan="4" class="text-center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script type="module" src="admin.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
