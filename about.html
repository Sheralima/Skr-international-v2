<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SKR INTERNATIONAL - Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand fw-bold">
SKR INTERNATIONAL ADMIN
</span>

<button class="btn btn-danger" id="logoutBtn">
Logout
</button>

</div>

</nav>

<div class="container mt-4">

<div class="row g-3">

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h6>Total Users</h6>
<h2 id="totalUsers">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h6>Pending Deposits</h6>
<h2 id="pendingDeposits">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h6>Pending Withdraws</h6>
<h2 id="pendingWithdraws">0</h2>
</div>
</div>

<div class="col-md-3">
<div class="card shadow text-center p-3">
<h6>Total Balance</h6>
<h2 id="totalBalance">0</h2>
</div>
</div>

</div>

<hr>

<h4 class="mt-4">Deposit Requests</h4>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>User ID</th>

<th>Amount</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="depositTable">

</tbody>

</table>

</div>

<hr>

<h4>Withdraw Requests</h4>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>User ID</th>

<th>Amount</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="withdrawTable">

</tbody>

</table>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
